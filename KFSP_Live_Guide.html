<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFSP Live Guide</title>
<style>
:root{--p:#7B3AEC;--p-bg:#F3EEFA;--pass:#0DBE55;--fail:#FF3B30;--warn:#FFB020;--info:#4A91FD;--bg:#F7F7FA;--card:#fff;--text:#1A1A2E;--text2:#6B7280;--border:#E5E7EB}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#7B3AEC,#5a1fb8);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-right{display:flex;gap:8px;align-items:center}
.header-right select,.header-right input{padding:5px 10px;border:none;border-radius:6px;font-size:12px;background:rgba(255,255,255,.9);color:#333}
.hdr-btn{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);transition:.2s}
.hdr-btn:hover{background:rgba(255,255,255,.35)}
.hdr-btn.active{background:#fff;color:var(--p)}

/* Progress bar */
.progress-strip{height:4px;background:#e0e0e0;position:sticky;top:52px;z-index:99}
.progress-fill{height:100%;background:var(--pass);transition:width .5s ease}

/* Main layout */
.main{display:flex;min-height:calc(100vh - 56px)}

/* Steps sidebar */
.steps-col{width:320px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.step-item{padding:12px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:flex-start;position:relative}
.step-item:hover{background:#faf7ff}
.step-item.active{background:var(--p-bg);border-left:4px solid var(--p)}
.step-item.done{opacity:.6}
.step-item.done::after{content:'✓';position:absolute;right:12px;top:12px;color:var(--pass);font-weight:700;font-size:14px}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff}
.step-item.active .step-num{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,58,236,.4)}50%{box-shadow:0 0 0 8px rgba(123,58,236,0)}}
.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:600;margin-bottom:2px}
.step-sub{font-size:11px;color:var(--text2);line-height:1.4}
.step-workspace{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px}
.ws-desktop{background:var(--p-bg);color:var(--p)}
.ws-terminal{background:#E3F2FD;color:var(--info)}
.ws-both{background:#E8F9EF;color:var(--pass)}

/* Detail panel */
.detail-col{flex:1;padding:20px;overflow-y:auto}
.detail-card{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:16px}
.detail-card h2{font-size:18px;font-weight:700;color:var(--p);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.detail-card .phase-label{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:12px}

/* Command box */
.cmd-box{background:#1a1a2e;color:#e0e0e0;border-radius:10px;padding:16px;margin:12px 0;font-family:'SF Mono',Consolas,monospace;font-size:13px;position:relative;line-height:1.6}
.cmd-box .cmd-line{color:#0DBE55;font-weight:600}
.cmd-box .cmd-comment{color:#6B7280;font-style:italic}
.cmd-copy{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;color:#aaa;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.cmd-copy:hover{background:rgba(255,255,255,.2);color:#fff}

/* Checklist */
.checklist{list-style:none;margin:12px 0}
.checklist li{padding:8px 12px;border-radius:8px;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;transition:.15s}
.checklist li:hover{background:#f9f9fb}
.checklist li .chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:.2s}
.checklist li.checked .chk{background:var(--pass);border-color:var(--pass);color:#fff}
.checklist li.checked{color:var(--text2);text-decoration:line-through}

/* Next action highlight */
.next-action{background:linear-gradient(135deg,var(--p-bg),#e8d8ff);border:2px solid var(--p);border-radius:12px;padding:16px;margin:16px 0}
.next-action h3{font-size:14px;font-weight:700;color:var(--p);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.next-action .na-cmd{font-family:'SF Mono',Consolas,monospace;font-size:14px;font-weight:700;color:var(--p);background:#fff;padding:8px 14px;border-radius:8px;display:inline-block;margin:4px 0;cursor:pointer;border:1px solid var(--p)}
.next-action .na-cmd:hover{background:var(--p);color:#fff}
.next-action .na-desc{font-size:12px;color:var(--text2);margin-top:6px}

/* Workspace indicator */
.ws-indicator{display:flex;gap:12px;margin:16px 0;padding:12px;background:#f9f9fb;border-radius:10px}
.ws-box{flex:1;padding:10px 14px;border-radius:8px;text-align:center;font-size:12px;font-weight:600;border:2px solid transparent}
.ws-box.active-ws{border-style:solid}
.ws-box.desktop-ws{background:var(--p-bg);color:var(--p)}
.ws-box.desktop-ws.active-ws{border-color:var(--p)}
.ws-box.terminal-ws{background:#E3F2FD;color:var(--info)}
.ws-box.terminal-ws.active-ws{border-color:var(--info)}
.ws-box .ws-status{font-size:10px;font-weight:400;color:var(--text2);margin-top:2px}

/* File zones */
.file-zones{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.fz{padding:10px 12px;border-radius:8px;font-size:11px;font-family:'SF Mono',Consolas,monospace}
.fz-write{background:#FFF7E6;color:#CC5500;border:1px solid #ffe0b0}
.fz-read{background:#f0f0f0;color:var(--text2);border:1px solid var(--border)}
.fz-blocked{background:#FFECEB;color:var(--fail);border:1px solid #ffcccc;text-decoration:line-through}

/* Timer */
.timer{font-size:11px;color:var(--text2);text-align:center;padding:8px;background:#f9f9fb;border-radius:8px;margin-top:12px}
.timer strong{color:var(--text);font-size:14px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;z-index:600;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Task Board */
.task-board{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.tb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(135deg,#FFF7E6,#FFE8CC);border-bottom:1px solid #ffe0b0;cursor:pointer;user-select:none}
.tb-header h3{font-size:14px;font-weight:700;color:#CC5500;display:flex;align-items:center;gap:8px}
.tb-header .tb-stats{font-size:12px;color:#996633;font-weight:600}
.tb-header .tb-toggle{font-size:16px;transition:.3s;color:#CC5500}
.tb-header:hover{background:linear-gradient(135deg,#FFF0D6,#FFE0B0)}
.task-board.collapsed .tb-body{display:none}
.task-board.collapsed .tb-toggle{transform:rotate(-90deg)}
.tb-body{padding:8px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin:2px 0;cursor:pointer;transition:.15s;border:2px solid transparent}
.task-item:hover{background:#f9f9fb}
.task-item.active-task{background:var(--p-bg);border-color:var(--p)}
.task-item.task-done{opacity:.5}
.task-item.task-done .task-name{text-decoration:line-through}
.task-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;cursor:pointer;transition:.2s}
.task-chk:hover{border-color:var(--pass);background:#E8F9EF}
.task-item.task-done .task-chk{background:var(--pass);border-color:var(--pass);color:#fff}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:600;margin-bottom:2px}
.task-desc{font-size:11px;color:var(--text2);line-height:1.5;display:none}
.task-item.active-task .task-desc{display:block}
.task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.task-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.tag-high{background:#FFECEB;color:var(--fail)}
.tag-medium{background:#FFF7E6;color:#CC5500}
.tag-files{background:#f0f0f0;color:var(--text2);font-weight:400;font-size:10px}
.task-detail-card{background:#FAFBFF;border:1px solid #E8EAFF;border-radius:10px;padding:14px;margin:12px 12px 8px;font-size:12px;line-height:1.7}
.task-detail-card h4{font-size:13px;font-weight:700;color:var(--p);margin-bottom:8px}
.task-detail-card code{background:#1a1a2e;color:#A6E3A1;padding:2px 6px;border-radius:4px;font-size:11px}
.task-detail-card ul{margin:4px 0 4px 16px;font-size:12px}
.task-detail-card .td-decision{background:#E8F9EF;padding:8px 10px;border-radius:6px;margin-top:8px;font-size:11px;color:#1A5C34;border:1px solid #B8E6C8}

/* Terminal Setup Guide */
.terminal-guide{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border:2px solid var(--info);border-radius:12px;padding:20px;margin:16px 0}
.terminal-guide h3{font-size:15px;font-weight:700;color:var(--info);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tg-step{display:flex;gap:12px;margin:10px 0;padding:12px;background:rgba(255,255,255,.8);border-radius:8px;align-items:flex-start}
.tg-num{width:28px;height:28px;border-radius:50%;background:var(--info);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.tg-content{flex:1;font-size:12px;line-height:1.6}
.tg-content strong{display:block;font-size:13px;margin-bottom:2px;color:var(--text)}
.tg-content code{background:#1a1a2e;color:#A6E3A1;padding:3px 8px;border-radius:4px;font-size:12px;display:inline-block;margin:2px 0;cursor:pointer;border:1px solid transparent;transition:.2s}
.tg-content code:hover{border-color:var(--info);background:#2a2a4e}
.tg-content code::after{content:' 📋';font-size:10px;opacity:.5}
.tg-verify{background:#E8F9EF;border:1px solid #B8E6C8;border-radius:8px;padding:12px;margin-top:12px}
.tg-verify h4{font-size:12px;font-weight:700;color:#0A8A3E;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tg-verify li{font-size:12px;padding:2px 0;padding-left:20px;position:relative;color:#1A5C34;list-style:none}
.tg-verify li::before{content:'✅';position:absolute;left:0;font-size:10px}
.tg-warn{background:#FFECEB;border:1px solid #FFCCCC;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:11px;color:#CC0000;display:flex;gap:6px;align-items:flex-start}

/* Responsive */
@media(max-width:768px){
  .main{flex-direction:column}
  .steps-col{width:100%;height:auto;position:static;display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border)}
  .step-item{min-width:140px;flex-direction:column;align-items:center;text-align:center;border-bottom:none;border-right:1px solid #f5f5f5}
  .file-zones{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>🥋 KFSP Live Guide</h1>
  <div class="header-right">
    <input id="phaseInput" type="text" placeholder="Phase: VD 4.11" style="width:100px" oninput="saveGuideState()">
    <select id="sessionType" onchange="switchSession()">
      <option value="dev">🔨 Code session</option>
      <option value="release">🚀 Release session</option>
    </select>
    <button class="hdr-btn" onclick="resetGuide()">Làm mới</button>
    <button class="hdr-btn" onclick="saveHTML()">💾 Lưu</button>
  </div>
</div>

<div class="progress-strip"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="main">
  <div class="steps-col" id="stepsCol"></div>
  <div class="detail-col" id="detailCol"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// LIFECYCLE STEPS — 2 chế độ
// =============================================

// ── RELEASE SESSION: Tổng test + submit store (sau merge nhiều features) ──
const RELEASE_STEPS = [
  {
    id: 'merge',
    num: 1,

    color: '#FFB020',

function getSteps() {
  return STATE.sessionType === 'release' ? RELEASE_STEPS : DEV_STEPS;
}

// =============================================
const LS_KEY = 'kfsp_live_guide_state';
let STATE = {
  currentStep: 0,
  checklistState: {},
  phase: '',
  sessionType: 'dev',
  startTime: null,
  stepTimes: {},
  tasksDone: {},
  tasksExpanded: {},
  taskBoardCollapsed: false
};

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) STATE = { ...STATE, ...JSON.parse(raw) };
  } catch(e) {}
  document.getElementById('phaseInput').value = STATE.phase || '';
  document.getElementById('sessionType').value = STATE.sessionType || 'dev';
  if (!STATE.startTime) STATE.startTime = Date.now();
}

function saveGuideState() {
  STATE.phase = document.getElementById('phaseInput').value;
  STATE.sessionType = document.getElementById('sessionType').value;
  try { localStorage.setItem(LS_KEY, JSON.stringify(STATE)); } catch(e) {}
}

  renderSteps();

function renderTaskBoard() {
  const doneCount = SESSION_TASKS.filter(t => STATE.tasksDone[t.id]).length;
  const total = SESSION_TASKS.length;
  const collapsed = STATE.taskBoardCollapsed ? 'collapsed' : '';

  let tasksHtml = '';
  SESSION_TASKS.forEach((t, i) => {
    const done = STATE.tasksDone[t.id] ? 'task-done' : '';
    const expanded = STATE.tasksExpanded[t.id] ? 'active-task' : '';
    const prioTag = t.priority === 'high' ? '<span class="task-tag tag-high">Cao</span>' : '<span class="task-tag tag-medium">TB</span>';
    const filesTags = t.files.length > 0 ? t.files.map(f => `<span class="task-tag tag-files">${f}</span>`).join('') : '<span class="task-tag tag-files">Chờ quyết định</span>';

    tasksHtml += `
      <div class="task-item ${done} ${expanded}" data-task="${t.id}">
        <div class="task-chk" onclick="event.stopPropagation();toggleTask('${t.id}')">${STATE.tasksDone[t.id] ? '✓' : (i+1)}</div>
        <div class="task-body" onclick="expandTask('${t.id}')">
          <div class="task-name">${t.name}</div>
          <div class="task-meta">${prioTag}${filesTags}</div>
          <div class="task-desc">${t.desc}</div>
        </div>
      </div>`;

    if (STATE.tasksExpanded[t.id] && t.desc) {
      tasksHtml += `<div class="task-detail-card"><h4>#${i+1} — Chi tiết</h4>${t.desc}</div>`;
    }
  });

  return `
    <div class="task-board ${collapsed}">
      <div class="tb-header" onclick="toggleTaskBoard()">
        <h3>📋 Việc cần làm phiên này</h3>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="tb-stats">${doneCount}/${total} xong</div>
          <div style="width:80px;height:6px;border-radius:3px;background:#e0e0e0;overflow:hidden"><div style="height:100%;width:${total>0?(doneCount/total*100):0}%;background:var(--pass);border-radius:3px;transition:width .4s"></div></div>
          <div class="tb-toggle">▼</div>
        </div>
      </div>
      <div class="tb-body">${tasksHtml}</div>
    </div>`;
}

function toggleTask(id) {
  STATE.tasksDone[id] = !STATE.tasksDone[id];
  render();
  const doneCount = SESSION_TASKS.filter(t => STATE.tasksDone[t.id]).length;
  showToast(STATE.tasksDone[id] ? `✅ Xong #${SESSION_TASKS.findIndex(t=>t.id===id)+1} (${doneCount}/${SESSION_TASKS.length})` : 'Đã bỏ đánh dấu');
}

function expandTask(id) {
  const wasExpanded = STATE.tasksExpanded[id];
  STATE.tasksExpanded = {};
  if (!wasExpanded) STATE.tasksExpanded[id] = true;
  render();
}

function toggleTaskBoard() {
  STATE.taskBoardCollapsed = !STATE.taskBoardCollapsed;
  render();
}

function updateProgress() {
  const totalChecks = getSteps().reduce((sum, s) => sum + s.checklist.length, 0);
  const doneChecks = Object.values(STATE.checklistState).filter(v => v).length;
  const tasksDone = SESSION_TASKS.filter(t => STATE.tasksDone[t.id]).length;
  const tasksTotal = SESSION_TASKS.length;
  // Progress = 40% lifecycle steps + 20% checklist + 40% session tasks
  const stepProgress = (STATE.currentStep / getSteps().length) * 40;
  const checkProgress = totalChecks > 0 ? (doneChecks / totalChecks) * 20 : 0;
  const taskProgress = tasksTotal > 0 ? (tasksDone / tasksTotal) * 40 : 0;
  document.getElementById('progressFill').style.width = (stepProgress + checkProgress + taskProgress) + '%';
}

// =============================================
// INTERACTIONS
// =============================================
function goToStep(i) {
  if (i < 0 || i >= getSteps().length) return;
  STATE.currentStep = i;
  STATE.stepTimes[getSteps()[i].id] = Date.now();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCheck(key) {
  STATE.checklistState[key] = !STATE.checklistState[key];
  render();
}

function copyCommands(stepIdx) {
  const cmds = getSteps()[stepIdx].commands.join('\n');
  navigator.clipboard.writeText(cmds).then(() => showToast('Đã copy lệnh'));
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Đã copy: ' + text));
}

function switchSession() {
  STATE.sessionType = document.getElementById('sessionType').value;
  STATE.currentStep = 0;
  STATE.checklistState = {};
  render();
  showToast(STATE.sessionType === 'release' ? '🚀 Release session' : '🔨 Code session');
  saveGuideState();
}

function resetGuide() {
  if (!confirm('Làm mới toàn bộ guide? (Xoá checklist, về bước 1)')) return;
  STATE = { currentStep: 0, checklistState: {}, phase: '', sessionType: 'dev', startTime: Date.now(), stepTimes: {} };
  document.getElementById('phaseInput').value = '';
  document.getElementById('sessionType').value = 'dev';
  render();
  showToast('Đã làm mới guide');
}

function saveHTML() {
  const stateJSON = JSON.stringify(STATE);
  const html = document.documentElement.outerHTML;
  const marker = '<!--GUIDE_STATE-->';
  const markerEnd = '<!--/GUIDE_STATE-->';
  let output;
  if (html.includes(marker)) {
    output = html.replace(new RegExp(marker+'[\\s\\S]*?'+markerEnd,'g'), marker + '<script id="guideState" type="application/json">' + stateJSON + '<\/script>' + markerEnd);
  } else {
    output = html.replace('</body>', marker + '<script id="guideState" type="application/json">' + stateJSON + '<\/script>' + markerEnd + '\n</body>');
  }
  const blob = new Blob([output], { type:'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `KFSP_Live_Guide_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Đã lưu guide');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Elapsed timer
function updateTimer() {
  const el = document.getElementById('elapsed');
  if (el && STATE.startTime) {
    const mins = Math.floor((Date.now() - STATE.startTime) / 60000);
    el.textContent = mins < 60 ? mins + ' phút' : Math.floor(mins/60) + 'h ' + (mins%60) + 'p';
  }
}

// =============================================
// INIT
// =============================================
window.addEventListener('DOMContentLoaded', () => {
  // Check embedded state
  const savedEl = document.getElementById('guideState');
  if (savedEl) {
    try {
      STATE = { ...STATE, ...JSON.parse(savedEl.textContent) };
      document.getElementById('phaseInput').value = STATE.phase || '';
      document.getElementById('sessionType').value = STATE.sessionType || 'dev';
      saveGuideState();
    } catch(e) {}
  } else {
    loadState();
  }
  if (!STATE.startTime) STATE.startTime = Date.now();
  render();
  setInterval(updateTimer, 30000);
  updateTimer();
});
</script>
